<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checklist Preoperacional</title>

<style>

body{
font-family:Segoe UI;
background:#f4f6f8;
padding:20px;
}

.container{
max-width:850px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

h2{
text-align:center;
}

.section{
margin-top:30px;
}

.item{
margin-bottom:15px;
}

.options{
display:flex;
gap:15px;
margin-top:5px;
}

.progress{
background:#ddd;
height:22px;
border-radius:10px;
overflow:hidden;
margin-bottom:20px;
}

.progress-bar{
height:100%;
width:0%;
background:#4caf50;
text-align:center;
color:white;
font-size:12px;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

textarea{
height:80px;
}

button{
margin-top:25px;
width:100%;
padding:12px;
background:#1e88e5;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}

.resultado{
margin-top:15px;
font-weight:bold;
text-align:center;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h2>Checklist Preoperacional Unidad Refrigerada</h2>

<div class="progress">
<div class="progress-bar" id="progressBar">0%</div>
</div>

<form id="formChecklist">

<div class="section">

<h3>1️⃣ Identificación</h3>

<label>Sucursal</label>
<select id="sucursal" name="sucursal" required></select>

<label>Placa</label>
<select id="placa" name="placa" required></select>

<label>Conductor</label>
<input type="text" name="conductor" required>

<label>Kilometraje</label>
<input type="number" name="km" required>

</div>

<div id="checklistContainer"></div>

<div class="section">

<h3>Temperatura del equipo °C</h3>
<input type="number" name="temperatura">

</div>

<div class="section">

<h3>Observaciones</h3>
<textarea name="observaciones"></textarea>

</div>

<div class="resultado" id="resultado"></div>

<button type="submit">Enviar Checklist</button>

</form>

</div>

<script>

const URL_SCRIPT="https://script.google.com/macros/s/AKfycbyAFjClJDZTqnTpfFR7XHnmHlv_Ox48Fs7aHEYj_BAkcMnnW4yxVcWfjF6knyc6z-zPng/exec"

const checklist = {

"2️⃣ Seguridad del vehículo":[
"Luces delanteras",
"Luces altas",
"Luces traseras",
"Luces de freno",
"Direccionales",
"Bocina",
"Espejos",
"Limpiaparabrisas",
"Cinturón seguridad"
],

"3️⃣ Estado mecánico":[
"Nivel aceite",
"Nivel refrigerante",
"Fugas visibles",
"Estado batería",
"Correas"
],

"4️⃣ Llantas":[
"Presión correcta",
"Estado neumáticos",
"Tuercas completas"
],

"5️⃣ Frenos":[
"Frenos responden",
"Freno de mano"
],

"6️⃣ Equipo de refrigeración":[
"Equipo de frío enciende",
"Sin alarmas",
"Evaporador limpio",
"Ventiladores funcionando",
"Condensador limpio"
],

"7️⃣ Estado del furgón":[
"Interior limpio",
"Piso en buen estado",
"Puertas cierran bien",
"Sellos puerta",
"Cortinas térmicas"
],

"8️⃣ Seguridad":[
"Extintor vigente",
"Triángulos seguridad",
"Botiquín",
"Chaleco reflectivo"
],

"9️⃣ Documentos":[
"SOAT vigente",
"Tarjeta propiedad",
"Licencia conductor"
]

}

const container=document.getElementById("checklistContainer")

Object.entries(checklist).forEach(([section,items])=>{

let div=document.createElement("div")
div.className="section"

let html=`<h3>${section}</h3>`

items.forEach((item,i)=>{

let name=section+i

html+=`

<div class="item">

${item}

<div class="options">

<label><input type="radio" name="${name}" value="OK"> OK</label>
<label><input type="radio" name="${name}" value="OBS"> OBS</label>
<label><input type="radio" name="${name}" value="FALLA"> FALLA</label>

</div>

</div>

`

})

div.innerHTML=html

container.appendChild(div)

})

let placasData=[]

fetch(URL_SCRIPT)
.then(r=>r.json())
.then(data=>{

placasData=data

const sucursales=[...new Set(data.map(x=>x.sucursal))]

const s=document.getElementById("sucursal")

s.innerHTML='<option value="">Seleccionar</option>'

sucursales.forEach(x=>{
let o=document.createElement("option")
o.value=x
o.text=x
s.appendChild(o)
})

})

document.getElementById("sucursal").addEventListener("change",function(){

const suc=this.value
const placa=document.getElementById("placa")

placa.innerHTML='<option value="">Seleccionar placa</option>'

placasData.filter(p=>p.sucursal==suc).forEach(p=>{
let o=document.createElement("option")
o.value=p.placa
o.text=p.placa
placa.appendChild(o)
})

})

document.addEventListener("change",function(e){

if(e.target.type==="radio"){
updateProgress()
}

})

function updateProgress(){

const total=[...new Set([...document.querySelectorAll("input[type=radio]")].map(r=>r.name))].length
const checked=[...new Set([...document.querySelectorAll("input[type=radio]:checked")].map(r=>r.name))].length

let percent=Math.round((checked/total)*100)

document.getElementById("progressBar").style.width=percent+"%"
document.getElementById("progressBar").innerText=percent+"%"

}

document.getElementById("formChecklist").addEventListener("submit",function(e){

e.preventDefault()

let formData=new FormData(this)
let datos=Object.fromEntries(formData.entries())

let valores=Object.values(datos)

let estado="APTO"

if(valores.includes("FALLA")) estado="NO SALIR"
else if(valores.includes("OBS")) estado="REVISAR"

document.getElementById("resultado").innerText="Resultado: "+estado

fetch(URL_SCRIPT,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(datos)
})

.then(res=>res.text())
.then(res=>{
alert("Checklist enviado correctamente")
})

})

</script>

</body>
</html>
