<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checklist Unidad Refrigerada</title>

<style>

body{
font-family:Segoe UI;
background:#f4f6f8;
padding:20px;
}

.container{
max-width:750px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 12px rgba(0,0,0,0.15);
}

h2{
text-align:center;
}

.section{
margin-top:25px;
}

.item{
margin-bottom:15px;
}

.options{
display:flex;
gap:15px;
}

label{
font-weight:600;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

textarea{
height:80px;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#1e88e5;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}

.progress{
background:#ddd;
height:20px;
border-radius:10px;
overflow:hidden;
margin-bottom:20px;
}

.progress-bar{
height:100%;
width:0%;
background:#4caf50;
text-align:center;
color:white;
font-size:12px;
}

</style>

</head>

<body>

<div class="container">

<h2>Checklist Preoperacional</h2>

<div class="progress">
<div class="progress-bar" id="progressBar">0%</div>
</div>

<form id="formChecklist">

<div class="section">

<label>Sucursal</label>

<select id="sucursal" name="sucursal" required>
<option value="">Cargando sucursales...</option>
</select>

<label>Placa</label>

<select id="placa" name="placa" required>
<option value="">Seleccione sucursal primero</option>
</select>

<label>Conductor</label>
<input type="text" name="conductor" required>

<label>Kilometraje</label>
<input type="number" name="km" required>

</div>

<div class="section">

<h3>Seguridad Vehicular</h3>

<div class="item">
Luces delanteras
<div class="options">
<label><input type="radio" name="luces" value="OK">OK</label>
<label><input type="radio" name="luces" value="OBS">OBS</label>
<label><input type="radio" name="luces" value="FALLA">FALLA</label>
</div>
</div>

<div class="item">
Direccionales
<div class="options">
<label><input type="radio" name="direccionales" value="OK">OK</label>
<label><input type="radio" name="direccionales" value="OBS">OBS</label>
<label><input type="radio" name="direccionales" value="FALLA">FALLA</label>
</div>
</div>

<div class="item">
Bocina
<div class="options">
<label><input type="radio" name="bocina" value="OK">OK</label>
<label><input type="radio" name="bocina" value="OBS">OBS</label>
<label><input type="radio" name="bocina" value="FALLA">FALLA</label>
</div>
</div>

</div>

<div class="section">

<h3>Equipo de Refrigeración</h3>

<div class="item">
Equipo de frío
<div class="options">
<label><input type="radio" name="frio" value="OK">OK</label>
<label><input type="radio" name="frio" value="OBS">OBS</label>
<label><input type="radio" name="frio" value="FALLA">FALLA</label>
</div>
</div>

<label>Temperatura °C</label>
<input type="number" name="temperatura">

</div>

<div class="section">

<h3>Fotos Inspección</h3>

<label>Foto frontal unidad</label>
<input type="file" name="foto1" accept="image/*" capture="environment">

<label>Foto interior furgón</label>
<input type="file" name="foto2" accept="image/*" capture="environment">

<label>Foto panel equipo frío</label>
<input type="file" name="foto3" accept="image/*" capture="environment">

</div>

<div class="section">

<label>Observaciones</label>
<textarea name="observaciones"></textarea>

</div>

<button type="submit">Enviar Checklist</button>

</form>

</div>

<script>

const URL_SCRIPT="https://script.google.com/macros/s/AKfycbyAFjClJDZTqnTpfFR7XHnmHlv_Ox48Fs7aHEYj_BAkcMnnW4yxVcWfjF6knyc6z-zPng/exec"

let placasData=[]

fetch(URL_SCRIPT+"?tipo=placas")

.then(res=>res.json())

.then(data=>{

placasData=data

const sucursales=[...new Set(data.map(x=>x.sucursal))]

const selectSucursal=document.getElementById("sucursal")

selectSucursal.innerHTML='<option value="">Seleccionar sucursal</option>'

sucursales.forEach(s=>{

let option=document.createElement("option")
option.value=s
option.text=s

selectSucursal.appendChild(option)

})

})

document.getElementById("sucursal").addEventListener("change",function(){

const sucursal=this.value
const selectPlaca=document.getElementById("placa")

selectPlaca.innerHTML='<option value="">Seleccionar placa</option>'

placasData
.filter(p=>p.sucursal==sucursal)
.forEach(p=>{

let option=document.createElement("option")

option.value=p.placa
option.text=p.placa

selectPlaca.appendChild(option)

})

})

document.getElementById("formChecklist").addEventListener("submit",function(e){

e.preventDefault()

fetch(URL_SCRIPT,{
method:"POST",
body:new FormData(this)
})

alert("Checklist enviado correctamente")

this.reset()

})

</script>

</body>
</html>
