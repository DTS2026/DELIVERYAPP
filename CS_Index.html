<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CheckList</title>

<style>

body{
font-family:Segoe UI,Arial;
background:#eef2f6;
margin:0;
padding:0;
}

/* HEADER APP */

.header{
position:fixed;
top:0;
left:0;
width:100%;
background:#ffe100;
display:flex;
align-items:center;
justify-content:space-between;
padding:14px 20px;
font-weight:bold;
z-index:1000;
box-shadow:0 3px 10px rgba(0,0,0,0.25);
}

.header-left{
color:red;
font-weight:900;
}

.header-center{
color:white;
font-size:20px;
font-weight:900;
flex:1;
text-align:center;
-webkit-text-stroke:1px black;
}

.header-right{
color:black;
font-weight:700;
font-size:14px;
}

/* CONTENEDOR */

.container{
max-width:750px;
margin:auto;
background:white;
min-height:100vh;
padding:20px;
padding-top:85px;
}

/* PROGRESS */

.progress{
background:#e5e7eb;
height:22px;
border-radius:15px;
overflow:hidden;
margin-bottom:15px;
}

.progress-bar{
height:100%;
width:0%;
background:#22c55e;
text-align:center;
color:white;
font-size:12px;
line-height:22px;
transition:width 0.5s ease;
}

/* CONTADOR */

.stats{
display:flex;
justify-content:space-around;
margin-bottom:15px;
font-size:13px;
font-weight:600;
}

.stats div{
padding:6px 10px;
border-radius:8px;
}

.okStat{background:#e8f7ee;color:#16a34a}
.obsStat{background:#fff7e6;color:#d97706}
.fallaStat{background:#ffecec;color:#dc2626}

/* SECCIONES */

.section{
margin-top:25px;
padding:15px;
background:#f8fafc;
border-radius:12px;
border:1px solid #e2e8f0;
}

.section h3{
margin-top:0;
color:#1e3a5f;
font-size:18px;
}

/* ITEMS */

.item{
margin-bottom:18px;
font-size:15px;
}

/* BOTONES OPCION */

.options{
display:flex;
gap:8px;
margin-top:6px;
flex-wrap:wrap;
}

.option-btn{
flex:1;
}

.option-btn input{
display:none;
}

.option-btn label{
display:block;
text-align:center;
padding:6px 8px;
border-radius:10px;
font-weight:600;
cursor:pointer;
border:2px solid #d1d5db;
background:#f9fafb;
transition:all .2s;
font-size:12px;
line-height:14px;
}

.option-btn input:checked + label{
color:white;
border:none;
transform:scale(1.02);
}

/* OK */

.ok label{background:#e8f7ee;}
.ok input:checked + label{background:#22c55e;}

/* OBS */

.obs label{background:#fff7e6;}
.obs input:checked + label{background:#f59e0b;}

/* FALLA */

.falla label{background:#ffecec;}
.falla input:checked + label{background:#ef4444;}

/* INPUTS */

input,select,textarea{
width:100%;
padding:10px;
margin-top:6px;
border:1px solid #cbd5e1;
border-radius:8px;
font-size:14px;
}

textarea{
height:90px;
}

/* BOTON NORMAL */

button{
margin-top:25px;
width:100%;
padding:14px;
background:#1e88e5;
color:white;
border:none;
border-radius:12px;
font-size:17px;
font-weight:bold;
}

/* RESULTADO */

.resultado{
margin-top:15px;
font-weight:bold;
text-align:center;
font-size:18px;
}

/* FOTO FALLA */

#fotoContainer{
display:none;
}

</style>

</head>

<body>

<div class="header">

<div class="header-left">
RAZZETO
</div>

<div class="header-center">
CHECKLIST SEMANAL
</div>

<div class="header-right">
GRUPO DN
</div>

</div>

<div class="container">

<div class="progress">
<div class="progress-bar" id="progressBar">0%</div>
</div>

<div class="stats">
<div class="okStat">Perfecto: <span id="okCount">0</span></div>
<div class="obsStat">Revisar: <span id="obsCount">0</span></div>
<div class="fallaStat">Fallas: <span id="fallaCount">0</span></div>
</div>

<form id="formChecklist">

<div class="section">

<h3>1️⃣ Identificación</h3>

<label>Sucursal</label>
<select id="sucursal" name="sucursal" required></select>

<label>Placa</label>
<select id="placa" name="placa" required></select>

<label>Conductor</label>
<input type="text" name="conductor" required>

<label>Kilometraje</label>
<input type="number" name="km" required>

</div>

<div id="checklistContainer"></div>

<div class="section">

<h3>🌡 Temperatura del equipo °C</h3>
<input type="number" name="temperatura">

</div>

<div class="section">

<h3>📝 Observaciones</h3>
<textarea name="observaciones"></textarea>

</div>

<div class="section" id="fotoContainer">

<h3>📷 Evidencia de falla</h3>

<input type="file" id="fotoFalla" accept="image/*" capture="environment">

</div>

<div class="resultado" id="resultado"></div>

<button type="submit">Enviar Checklist</button>

</form>

</div>

<script>

const URL_SCRIPT="https://script.google.com/macros/s/AKfycbyFJbjd2__XxvKjX88k_X4TdeiuadPNy0GA33IfU6cYbS7jIxlSiee5fhey12monbAGOw/exec"

const checklist = {

"🚨 2️⃣ Seguridad del vehículo":[
"Luces delanteras",
"Luces altas",
"Luces traseras",
"Luces de freno",
"Direccionales",
"Bocina",
"Espejos",
"Limpiaparabrisas",
"Cinturón seguridad"
],

"⚙️ 3️⃣ Estado mecánico":[
"Nivel aceite",
"Nivel refrigerante",
"Fugas visibles",
"Estado batería",
"Correas"
],

"🛞 4️⃣ Llantas":[
"Presión correcta",
"Estado neumáticos",
"Tuercas completas"
],

"🛑 5️⃣ Frenos":[
"Frenos responden",
"Freno de mano"
],

"❄️ 6️⃣ Equipo de refrigeración":[
"Equipo de frío enciende",
"Sin alarmas",
"Evaporador limpio",
"Ventiladores funcionando",
"Condensador limpio"
],

"📦 7️⃣ Estado del furgón":[
"Interior limpio",
"Piso en buen estado",
"Puertas cierran bien",
"Sellos puerta",
"Cortinas térmicas"
],

"🦺 8️⃣ Seguridad":[
"Extintor vigente",
"Triángulos seguridad",
"Botiquín",
"Chaleco reflectivo"
],

"📄 9️⃣ Documentos":[
"SOAT vigente",
"Tarjeta propiedad",
"Licencia conductor"
]

}

const container=document.getElementById("checklistContainer")

Object.entries(checklist).forEach(([section,items])=>{

let div=document.createElement("div")
div.className="section"

let html=`<h3>${section}</h3>`

items.forEach((item)=>{

let name=item.trim()

html+=`

<div class="item">

${item}

<div class="options">

<div class="option-btn ok">
<input type="radio" name="${name}" value="OK" required id="${name}-ok">
<label for="${name}-ok">OK<br>Perfecto</label>
</div>

<div class="option-btn obs">
<input type="radio" name="${name}" value="OBS" id="${name}-obs">
<label for="${name}-obs">OBS<br>Revisar</label>
</div>

<div class="option-btn falla">
<input type="radio" name="${name}" value="FALLA" id="${name}-falla">
<label for="${name}-falla">FALLA<br>Inoperativo</label>
</div>

</div>

</div>

`

})

div.innerHTML=html
container.appendChild(div)

})

let placasData=[]

fetch(URL_SCRIPT)
.then(r=>r.json())
.then(data=>{

placasData=data

const sucursales=[...new Set(data.map(x=>x.sucursal))]

const s=document.getElementById("sucursal")

s.innerHTML='<option value="">Seleccionar</option>'

sucursales.forEach(x=>{
let o=document.createElement("option")
o.value=x
o.text=x
s.appendChild(o)
})

})

document.getElementById("sucursal").addEventListener("change",function(){

const suc=this.value
const placa=document.getElementById("placa")

placa.innerHTML='<option value="">Seleccionar placa</option>'

placasData.filter(p=>p.sucursal==suc).forEach(p=>{
let o=document.createElement("option")
o.value=p.placa
o.text=p.placa
placa.appendChild(o)
})

})

document.addEventListener("change",function(e){

if(e.target.type==="radio"){
updateProgress()
updateStats()
checkFotoFalla()
}

})

function checkFotoFalla(){

let falla=document.querySelectorAll("input[value='FALLA']:checked").length
let fotoBox=document.getElementById("fotoContainer")

if(falla>0){
fotoBox.style.display="block"
}
else{
fotoBox.style.display="none"
}

}

function updateProgress(){

const total=[...new Set([...document.querySelectorAll("input[type=radio]")].map(r=>r.name))].length
const checked=[...new Set([...document.querySelectorAll("input[type=radio]:checked")].map(r=>r.name))].length

let percent=Math.round((checked/total)*100)

document.getElementById("progressBar").style.width=percent+"%"
document.getElementById("progressBar").innerText=percent+"%"

}

function updateStats(){

let ok=document.querySelectorAll("input[value='OK']:checked").length
let obs=document.querySelectorAll("input[value='OBS']:checked").length
let falla=document.querySelectorAll("input[value='FALLA']:checked").length

document.getElementById("okCount").innerText=ok
document.getElementById("obsCount").innerText=obs
document.getElementById("fallaCount").innerText=falla

}

document.getElementById("formChecklist").addEventListener("submit",async function(e){

e.preventDefault()

let falla=document.querySelectorAll("input[value='FALLA']:checked").length

if(falla>0){

let foto=document.getElementById("fotoFalla").files.length

if(foto==0){
alert("Debe tomar una foto de la falla antes de enviar")
return
}

}

let formData=new FormData(this)
let datos=Object.fromEntries(formData.entries())

const file=document.getElementById("fotoFalla").files[0]

if(file){

let base64=await new Promise(resolve=>{
let reader=new FileReader()
reader.onload=e=>resolve(e.target.result)
reader.readAsDataURL(file)
})

datos.foto=base64

}

let valores=Object.values(datos)

let estado="APTO"

if(valores.includes("FALLA")) estado="NO SALIR"
else if(valores.includes("OBS")) estado="REVISAR"

document.getElementById("resultado").innerText="Resultado: "+estado

fetch(URL_SCRIPT,{
method:"POST",
body:new URLSearchParams(datos)
})
.then(res=>res.text())
.then(res=>{
alert("Checklist enviado correctamente")
})
.catch(err=>{
alert("Error enviando checklist")
console.log(err)
})

})

</script>

</body>
</html>
