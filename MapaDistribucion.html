// Asignar color único a cada placa si no tiene
function asignarColorPlaca(placa, color){
    if(!placaColorMap[placa]){
        placaColorMap[placa] = color || generarColorUnico(Object.keys(placaColorMap).length);
    }
    return placaColorMap[placa];
}

// Genera un color HEX único basado en índice
function generarColorUnico(index){
    var colores = [
"#ff0000","#0000ff","#00ff00","#ff8000","#8000ff",
"#00ffff","#ff00ff","#ffff00","#800000","#008000",
"#000080","#808000","#800080","#008080","#ff8080",
"#80ff80","#8080ff","#ffcc00","#cc00ff","#00ccff",
"#ff6666","#66ff66","#6666ff","#ff9966","#9966ff",
"#66ffff","#ff66ff","#ffff66","#cc6666","#66cc66",
"#6666cc","#cccc66","#cc66cc","#66cccc","#ff9999",
"#99ff99","#9999ff","#ffcc99","#cc99ff","#99ccff"
];
    return colores[index % colores.length];
}

function colorPorPlaca(placa, hexColor){
    return {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 8,
        fillColor: asignarColorPlaca(placa, hexColor),
        fillOpacity: 1,
        strokeWeight: 1,
        strokeColor: '#000'
    };
}

function initialize(){
    mcpherData = mcpherDataPopulate();

    gMap = new google.maps.Map(document.getElementById('map_canvas'),{
        zoom:14,
        center:new google.maps.LatLng(-6.7802748,-79.8600005)
    });

    crearFiltros();
    mostrarMarcadores();
}





function crearFiltros(){
    var topbar = document.getElementById("topbar");

    var selectOp = document.createElement("select");
    selectOp.id = "filterOperacion";
    selectOp.innerHTML = "<option value=''>-- Operación --</option>";
    topbar.appendChild(selectOp);

    var selectVend = document.createElement("select");
    selectVend.id = "filterVendedor";
    selectVend.innerHTML = "<option value=''>-- Vendedor --</option>";
    topbar.appendChild(selectVend);

    var selectPlaca = document.createElement("select");
    selectPlaca.id = "filterPlaca";
    selectPlaca.innerHTML = "<option value=''>-- Placa --</option>";
    topbar.appendChild(selectPlaca);

    actualizarOpcionesFiltros();

    selectOp.onchange = function(){ filtrar(); actualizarOpcionesFiltros(); };
    selectVend.onchange = function(){ filtrar(); actualizarOpcionesFiltros(); };
    selectPlaca.onchange = function(){ filtrar(); };
}

function actualizarOpcionesFiltros(){
    var op = document.getElementById("filterOperacion").value;
    var vend = document.getElementById("filterVendedor").value;

    var ops = new Set();
    var vends = new Set();
    var placas = new Set();

    mcpherData.cJobject.forEach(function(c){
        var cOp = c.category.find(x=>x.OPERACIÓN)?.OPERACIÓN;
        var cVend = c.category.find(x=>x.VENDEDOR)?.VENDEDOR;
        var cPlaca = c.category.find(x=>x.PLACA)?.PLACA;

        // Listar todas las operaciones y vendedores
        if(cOp) ops.add(cOp);
        if(cVend) vends.add(cVend);

        // Placas solo de la operación seleccionada
        if(!op || cOp === op){
            if(cPlaca) placas.add(cPlaca);
        }
    });

    // Actualizar selects
    actualizarSelect("filterOperacion", ops);
    actualizarSelect("filterVendedor", vends);
    actualizarSelect("filterPlaca", placas);
}

function actualizarSelect(id, valores){
    var select = document.getElementById(id);
    var valActual = select.value;
    select.innerHTML = "<option value=''>-- "+id.replace("filter","")+" --</option>";
    Array.from(valores).sort().forEach(function(v){
        var opt = document.createElement("option");
        opt.value = v;
        opt.text = v;
        select.appendChild(opt);
    });
    if(Array.from(valores).includes(valActual)) select.value = valActual;
}

function mostrarMarcadores(){
    markers.forEach(m => m.setMap(null));
    markers = [];

    var op = document.getElementById("filterOperacion")?.value;
    var vend = document.getElementById("filterVendedor")?.value;
    var placa = document.getElementById("filterPlaca")?.value;

    mcpherData.cJobject.forEach(function(c){
        var cOp = c.category.find(x=>x.OPERACIÓN)?.OPERACIÓN;
        var cVend = c.category.find(x=>x.VENDEDOR)?.VENDEDOR;
        var cPlaca = c.category.find(x=>x.PLACA)?.PLACA;
        var cColor = c.color;

        if((!op || cOp===op) &&
           (!vend || cVend===vend) &&
           (!placa || cPlaca===placa)){

            var pos = new google.maps.LatLng(c.lat, c.lng);
            var marker = new google.maps.Marker({
                position: pos,
                map: gMap,
                title: c.title,
                icon: colorPorPlaca(cPlaca, cColor)
            });

            var infowindow = new google.maps.InfoWindow({
                content: "<div class='infocard'>"+c.content+"</div>"
            });

            marker.addListener("click", function(){ infowindow.open(gMap, marker); });
            markers.push(marker);
        }
    });
}

function filtrar(){ mostrarMarcadores(); }
</script>
